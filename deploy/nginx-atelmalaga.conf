server {
    listen 80;
    listen [::]:80;
    server_name atelsistems.com atelsistems.es www.atelsistems.com;

    root /var/www/atelweb_frontend_only;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /presupuesto {
        try_files $uri $uri/ /presupuesto/index.html;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|webp|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
