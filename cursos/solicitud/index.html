<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#448a3c">
    <title data-i18n="training-page-title">Solicitar formación a medida | ATEL SISTEMS</title>
    <link rel="icon" type="image/x-icon" href="../../img/favicon.ico">
    <link rel="stylesheet" href="../../css/bootstrap-icons.min.css?v=20260325a" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css';">
    <link rel="stylesheet" href="../../css/styles.css?v=20260324a">
    <link rel="stylesheet" href="../../css/presupuesto.css?v=20260411a">
</head>
<body>
    <header class="budget-header">
        <a href="../index.html" class="back-link"><i class="bi bi-arrow-left" aria-hidden="true"></i> <span data-i18n="training-back-link">Volver a cursos</span></a>
        <img src="../../img/anuncio1.webp" alt="ATEL SISTEMS" class="budget-logo">
        <select id="language-select" class="lang-select" aria-label="Seleccionar idioma" data-i18n-aria-label="lang-select-aria">
            <option value="es">ES</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="it">IT</option>
            <option value="de">DE</option>
            <option value="ru">RU</option>
            <option value="uk">UK</option>
            <option value="ar">AR</option>
        </select>
    </header>

    <main class="budget-main" aria-labelledby="training-title">
        <section class="budget-card">
            <h1 id="training-title" data-i18n="training-title">Solicitar formación a medida</h1>
            <p class="budget-subtitle" data-i18n="training-subtitle">Cuéntanos qué equipos y perfiles quieres formar y te enviaremos una propuesta adaptada.</p>

            <form id="training-form" class="budget-form" novalidate>
                <div class="form-grid">
                    <label>
                        <span class="required-label" data-i18n="training-label-name">Nombre y apellidos</span>
                        <input type="text" name="nombre" required maxlength="120" autocomplete="name">
                    </label>

                    <label>
                        <span data-i18n="training-label-company">Empresa o comunidad</span>
                        <input type="text" name="empresa" maxlength="150" autocomplete="organization">
                    </label>

                    <label>
                        <span class="required-label" data-i18n="training-label-email">Email</span>
                        <input type="email" name="email" required maxlength="150" autocomplete="email">
                    </label>

                    <label>
                        <span class="required-label" data-i18n="training-label-phone">Teléfono</span>
                        <input type="tel" name="telefono" required maxlength="30" autocomplete="tel">
                    </label>

                    <label>
                        <span class="required-label" data-i18n="training-label-role">Perfil del grupo</span>
                        <select name="perfil" required>
                            <option value="" data-i18n="training-role-default">Selecciona un perfil</option>
                            <option value="tecnico" data-i18n="training-role-tech">Responsables técnicos / mantenimiento</option>
                            <option value="facility" data-i18n="training-role-facility">Facility managers / operaciones</option>
                            <option value="admin" data-i18n="training-role-admin">Administradores de fincas</option>
                            <option value="vecinos" data-i18n="training-role-residents">Comunidades / residentes</option>
                            <option value="mixto" data-i18n="training-role-mixed">Mixto</option>
                        </select>
                    </label>

                    <label>
                        <span class="required-label" data-i18n="training-label-interest">Equipos o servicio de interés</span>
                        <select name="interes" required>
                            <option value="" data-i18n="training-interest-default">Selecciona una opción</option>
                            <option value="fire" data-i18n="training-interest-fire">Sistemas contra incendios</option>
                            <option value="cctv" data-i18n="training-interest-cctv">CCTV y videovigilancia</option>
                            <option value="access" data-i18n="training-interest-access">Control de accesos y videoporteros</option>
                            <option value="telecom" data-i18n="training-interest-telecom">Telecomunicaciones e ICT</option>
                            <option value="network" data-i18n="training-interest-network">Redes de voz y datos</option>
                            <option value="all" data-i18n="training-interest-all">Programa completo</option>
                        </select>
                    </label>

                    <label class="full-width">
                        <span class="required-label" data-i18n="training-label-message">Necesidades de formación</span>
                        <textarea name="mensaje" rows="6" required maxlength="2200" data-i18n-placeholder="training-placeholder-message" placeholder="Indica número de personas, equipos, nivel actual y objetivo de formación."></textarea>
                    </label>
                </div>

                <input type="hidden" name="formType" value="training-request">
                <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" class="hp-field" aria-hidden="true">

                <label class="check-row">
                    <input type="checkbox" name="acepta_privacidad" value="1" required>
                    <span data-i18n="training-privacy-text">Acepto la política de privacidad y el tratamiento de mis datos para recibir información sobre formación.</span>
                </label>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <i class="bi bi-send-fill" aria-hidden="true"></i>
                    <span data-i18n="training-submit">Enviar solicitud</span>
                </button>

                <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="../../js/translations.js?v=20260411z" defer></script>
    <script src="../../js/site-config.js?v=20260408a" defer></script>
    <script src="../../js/analytics.js?v=20260324a" defer></script>
    <script src="../../js/security.js" defer></script>
    <script src="../../js/cursos-form.js?v=20260411a" defer></script>
</body>
</html>
